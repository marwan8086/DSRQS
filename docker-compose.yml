version: '3.8'

services:
  dsrqs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsrqs-experiments
    volumes:
      - ./data:/dsrqs/data
      - ./runs:/dsrqs/runs
      - ./checkpoints:/dsrqs/checkpoints
      - ./results:/dsrqs/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    command: tail -f /dev/null
